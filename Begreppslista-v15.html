<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begreppslista v.15 - Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #2d3748;
            --primary-color: #e06c75;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --nav-bg: #2d3748;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --font-family: 'Segoe UI', Roboto, sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #1a202c;
            --text-color: #f7fafc;
            --card-bg: #2d3748;
            --border-color: #4a5568;
            --nav-bg: #11141a;
        }

        body {
            font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 0; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        nav { background-color: var(--nav-bg); box-shadow: var(--shadow-md); position: sticky; top: 0; z-index: 1000; }
        nav .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 60px; }
        .nav-links { display: flex; height: 100%; align-items: center; }
        nav a { color: #a0aec0; text-decoration: none; font-weight: 600; padding: 0 15px; height: 100%; display: flex; align-items: center; font-size: 0.95rem; }
        nav a:hover, nav a.active { color: #ffffff; }
        nav a.active { border-bottom: 4px solid var(--primary-color); background-color: rgba(255,255,255,0.05); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px 50px 20px; flex: 1; }
        .box { background-color: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 25px; box-shadow: var(--shadow-md); }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background-color: #718096; }
        
        .option-btn { background-color: var(--card-bg); border: 2px solid var(--border-color); padding: 16px; border-radius: 12px; cursor: pointer; margin-bottom: 12px; width: 100%; text-align: left; color: var(--text-color); font-size: 1rem; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary-color); }
        .option-btn.correct { background-color: #c6f6d5 !important; color: #22543d !important; border-color: #48bb78 !important; }
        .option-btn.wrong { background-color: #fed7d7 !important; color: #822727 !important; border-color: #e53e3e !important; }
        
        .timer-bar { height: 8px; background-color: #e06c75; width: 100%; border-radius: 4px; transition: width 1s linear; margin-bottom: 20px; }

        footer { background-color: var(--nav-bg); color: #a0aec0; text-align: center; padding: 15px 20px; font-size: 0.9rem; margin-top: auto; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-links">
                <a href="index.html">🏠 Hem</a>
                <a href="Begreppslista-v15.html" class="active">📖 Begrepp v.15</a>
            </div>
            <div class="nav-right" style="color: white; font-size: 0.8rem;">👤 underskoterskavok252</div>
        </div>
    </nav>

    <div class="container">
        <div id="study-section" class="box">
            <h2 class="section-title">📖 Studera begrepp v 15</h2>
            <div style="text-align: center; margin-bottom: 20px;">
                <button class="btn btn-secondary" onclick="startQuiz()">Starta Quiz (40 sekunder per fråga) 🎯</button>
            </div>
            <div id="terms-list"></div>
        </div>

        <div id="quiz-section" class="box" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 class="section-title">🎯 Quiz</h2>
                <div style="font-weight:700;">Poäng: <span id="current-score">0</span></div>
            </div>
            <div class="timer-bar" id="timer"></div>
            <div id="quiz-content">
                <div id="question-text" style="font-weight:700; font-size:1.2rem; margin-bottom:20px;"></div>
                <div id="options"></div>
                <button id="next-btn" class="btn" style="display:none; margin: 20px auto 0 auto;" onclick="nextQuestion()">Nästa fråga ➡️</button>
            </div>
        </div>
    </div>

    <footer>© 2026 - Mohsen Naderi</footer>

    <script>
        const termsData = [
            { term: "Demokratisk värdegrund", sv: "Alla människor har lika värde, rätt att bli respekterade och rätt att vara delaktiga i samhället." },
            { term: "Lika värده", sv: "Alla människor är olika och har unika förmågor. Det som är olika berikar och behövs för att utveckling ska ske." },
            { term: "Likvärdighet", sv: "Något ska vara lika bra för alla. Alla ska ha rätt till samma vård." },
            { term: "Inkludering", sv: "Alla människor får vara med och känna sig delaktiga, oavsett funktionsnedsättning, ålder eller bakgrund." },
            { term: "Tillgänglighet", sv: "Innebär att alla miljöer i samhället ska vara förberedda på att alla är olika och har olika behov." },
            { term: "Levnadsvillkor", sv: "Handlar om hur en person lever och vilka möjligheter personen har till ett bra och tryggt liv." },
            { term: "Delaktighet", sv: "Betyder att få vara med, påverka och känna att man är viktig i sitt eget liv." },
            { term: "Delaktighetsmodellen", sv: "Är ett arbetssätt för att stärka inflytande och självbestämmande för personer i behov av stöd." },
            { term: "Livskvalitet", sv: "Handlar om brukarens hälsa och välmående. Att känna sig välkommen och behövd." },
            { term: "Normer", sv: "Förväntningar, tankar och oskrivna regler om hur någonting är eller ska vara." },
            { term: "Värderingar", sv: "Att man får tycka och tänka som man vill och det styr vad vi gör och vad vi säger." },
            { term: "Funktionsförmåga", sv: "Beskriver hur en person fungerar fysiskt, psykiskt, kognitivt och socialt." },
            { term: "Fysisk funktionsförmåga", sv: "Nedsatt rörelseförmåga, nedsatt syn, nedsatt hörsel." },
            { term: "Psykisk funktionsförmåga", sv: "Trauma, sexuellt övergrepp, krig, livssituation." },
            { term: "Kognitiv funktionsförmåga", sv: "Svårt med inlärning, minنه, svårt att ta in information." },
            { term: "Social funktionsförmåga", sv: "Svårigheter med att skapa och bibehålla relationer." },
            { term: "Funktionsnedsättning", sv: "Betyder att en funktion är nedsatt och fungerar på ett annorlunda sätt." },
            { term: "Funktionshinder", sv: "Uppstår när omgivningen gör det svårt för en person med funktionsnedsättning." },
            { term: "Självbestämmande", sv: "Betyder att en person får vara med och bestämma över sitt eget liv." }
        ];

        let currentQuizIndex = 0;
        let score = 0;
        let quizQuestions = [];
        let timerInterval;
        let timeLeft = 40; // زمان کل سوال

        function speakSwedish(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'sv-SE';
            window.speechSynthesis.speak(utterance);
        }

        function startQuiz() {
            document.getElementById('study-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            currentQuizIndex = 0; score = 0;
            quizQuestions = [...termsData].sort(() => Math.random() - 0.5);
            generateQuizQuestion();
        }

        function generateQuizQuestion() {
            clearInterval(timerInterval);
            timeLeft = 40; // شروع تایمر از 40
            document.getElementById('timer').style.width = '100%';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').style.width = (timeLeft / 40) * 100 + '%';
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer(null, false);
                }
            }, 1000);

            const current = quizQuestions[currentQuizIndex];
            document.getElementById('question-text').innerText = `Fråga ${currentQuizIndex + 1}/19: Vad betyder "${current.term}"?`;
            speakSwedish(current.term);

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = "";
            document.getElementById('next-btn').style.display = "none";

            let options = [current];
            while (options.length < 3) {
                let rand = termsData[Math.floor(Math.random() * termsData.length)];
                if (!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.sv;
                btn.onclick = () => checkAnswer(btn, opt === current);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, isCorrect) {
            clearInterval(timerInterval);
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            if (isCorrect) {
                selectedBtn.classList.add('correct');
                score++;
                document.getElementById('current-score').innerText = score;
            } else {
                if (selectedBtn) selectedBtn.classList.add('wrong');
                buttons.forEach(btn => {
                    if (btn.innerText === quizQuestions[currentQuizIndex].sv) btn.classList.add('correct');
                });
            }
            document.getElementById('next-btn').style.display = "block";
        }

        function nextQuestion() {
            currentQuizIndex++;
            if (currentQuizIndex < quizQuestions.length) generateQuizQuestion();
            else {
                document.getElementById('quiz-content').innerHTML = `<h3>Klar! Poäng: ${score}/19</h3><button class="btn" onclick="location.reload()">Öva igen</button>`;
                if(score === 19) confetti();
            }
        }
    </script>
</body>
</html>
