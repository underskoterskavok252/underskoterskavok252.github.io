<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Pro Quiz+</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  text-align: center;
  padding: 20px;
}

.quiz-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
}

button {
  margin: 10px;
  padding: 10px;
  width: 100%;
  font-size: 16px;
  border: none;
  background: #4CAF50;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

input {
  padding: 10px;
  width: 80%;
  margin-bottom: 15px;
}

#timer {
  font-size: 18px;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<h2>🧠 Pro Quiz+</h2>

<input type="text" id="username" placeholder="Skriv ditt namn">

<div id="timer">Tid: 60</div>
<div class="quiz-box" id="quiz"></div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

const quizData = [
{q:"Vad betyder inkludering?", a:["Alla lika","Alla delaktiga","Endast vissa"], correct:1},
{q:"Vad är autonomi?", a:["Regler","Självbestämmande","Grupp"], correct:1},
{q:"Vad är funktionshinder?", a:["Miljöproblem","Sjukdom","Fel"], correct:0},
{q:"Vad är kognitiv förmåga?", a:["Minne","Syn","Muskel"], correct:0},
{q:"Vad är livskvalitet?", a:["Välmående","Pengar","Regler"], correct:0}
];

let current = 0;
let score = 0;
let time = 60;

function loadQuestion() {
  if (current >= quizData.length) {
    showResult();
    return;
  }

  let q = quizData[current];
  let html = "<h3>" + q.q + "</h3>";

  q.a.forEach((ans, i) => {
    html += `<button onclick="checkAnswer(${i})">${ans}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(i) {
  let correct = quizData[current].correct;

  if (i === correct) {
    score++;
    document.getElementById("correctSound").play();
  } else {
    document.getElementById("wrongSound").play();
  }

  current++;
  loadQuestion();
}

function showResult() {
  let name = document.getElementById("username").value || "Användare";
  let percent = Math.round((score / quizData.length) * 100);

  localStorage.setItem("quizScore", percent);

  let certificate = percent >= 70
    ? "🏆 Certifikat: GODKÄND"
    : "❌ Ej godkänd";

  document.getElementById("quiz").innerHTML =
    `<h2>Resultat</h2>
     <p>${name}</p>
     <p>${percent}%</p>
     <h3>${certificate}</h3>`;
}

function startTimer() {
  let timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Tid: " + time;

    if (time <= 0) {
      clearInterval(timer);
      showResult();
    }
  }, 1000);
}

loadQuestion();
startTimer();

</script>

</body>
</html>
