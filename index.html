<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vård och Omsorg - Startsida</title>
    <style>
        :root {
            --bg-color: #f7fafc;
            --text-color: #2d3748;
            --primary-color: #4299e1;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --nav-bg: #2c3e50;
            --font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .menu-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
        }

        .menu-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 10px rgba(66, 153, 225, 0.3);
        }

        .menu-link span {
            margin-right: 10px;
            font-size: 1.4rem;
        }

        .link-green { background-color: #48bb78; }
        .link-green:hover { background-color: #3da36b; }
        .link-green { box-shadow: 0 4px 6px rgba(72, 187, 120, 0.2); }
        .link-green:hover { box-shadow: 0 6px 10px rgba(72, 187, 120, 0.3); }

        .link-blue { background-color: var(--primary-color); }
        .link-blue:hover { background-color: #3182ce; }

        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vård och Omsorg</h1>
        <p class="subtitle">En resurssida för undersköterska-studenter. Välj ett ämne för att börja plugga!</p>

        <a href="Begreppslista-v15.html" class="menu-link link-green">
            <span>📖</span> Begreppslista Vecka 15
        </a>

        <a href="aldre-multisjuka.html" class="menu-link link-blue">
            <span>👵</span> Äldre multisjuka
        </a>

        <div class="footer">
            Denna sida är skapad för att underlätta för klasskamrater.
        </div>
    </div>

</body>
</html>
