<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Pro Quiz</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #667eea, #764ba2);
  color: white;
  text-align: center;
  padding: 20px;
}

.quiz-box {
  background: white;
  color: black;
  padding: 25px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
}

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  font-size: 16px;
  border: none;
  background: #4CAF50;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

#timer {
  font-size: 18px;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<h2>🧠 Pro Quiz</h2>
<div id="timer">Tid: 60</div>

<div class="quiz-box" id="quiz"></div>

<script>

const quizData = [
{
q: "Vad betyder inkludering?",
a: ["Alla behandlas lika", "Alla får vara delaktiga", "Endast vissa deltar"],
correct: 1
},
{
q: "Vad är autonomi?",
a: ["Följa regler", "Självbestämmande", "Grupparbete"],
correct: 1
},
{
q: "Vad är funktionshinder?",
a: ["Skapas av omgivningen", "Sjukdom", "Personens fel"],
correct: 0
},
{
q: "Vad är kognitiv förmåga?",
a: ["Tänkande och minne", "Syn", "Muskelstyrka"],
correct: 0
},
{
q: "Vad är livskvalitet?",
a: ["Välmående", "Pengar", "Regler"],
correct: 0
}
];

let current = 0;
let score = 0;
let time = 60;

function loadQuestion() {
  if (current >= quizData.length) {
    showResult();
    return;
  }

  let q = quizData[current];

  let html = "<h3>" + q.q + "</h3>";

  q.a.forEach((ans, i) => {
    html += `<button onclick="checkAnswer(${i})">${ans}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function checkAnswer(i) {
  let correct = quizData[current].correct;

  if (i === correct) {
    score++;
    alert("✅ Rätt!");
  } else {
    alert("❌ Fel!");
  }

  current++;
  loadQuestion();
}

function showResult() {
  let percent = Math.round((score / quizData.length) * 100);

  let certificate = percent >= 70
    ? "🏆 Certifikat: GODKÄND"
    : "❌ Ej godkänd";

  document.getElementById("quiz").innerHTML =
    `<h2>Resultat</h2>
     <p>Poäng: ${score}/${quizData.length}</p>
     <p>${percent}%</p>
     <h3>${certificate}</h3>`;
}

function startTimer() {
  let timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Tid: " + time;

    if (time <= 0) {
      clearInterval(timer);
      showResult();
    }
  }, 1000);
}

loadQuestion();
startTimer();

</script>

</body>
</html>
</script>

</body>
</html>
